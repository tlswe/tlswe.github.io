<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linus på Linjen - Liknande Spel</title>
    <style>
        body { background-color: black; color: white; font-family: Arial, sans-serif; text-align: center; }
        canvas { display: block; margin: 0 auto; background-color: black; }
        #startButton { font-size: 20px; padding: 10px 20px; margin: 20px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <button id="startButton">Starta Spelet och Tillåt Sensorer</button>
    <script>
        (function() {
            "use strict";

            // Konstantar
            const CANVAS_WIDTH = 800;
            const CANVAS_HEIGHT = 400;
            const COLORS = {
                BACKGROUND: 'black',
                FLOOR: 'white',
                PLAYER: 'white',
                OBSTACLES: 'white'
            };
            const FPS = 60;
            const FLOOR_Y = CANVAS_HEIGHT - 50;
            const PLAYER_X = CANVAS_WIDTH / 4;
            const PLAYER_SIZE = 50;
            const GRAVITY = 0.8;
            const BASE_JUMP_VELOCITY = 15;
            const MIN_OBSTACLE_DISTANCE = 300;
            const OBSTACLE_WIDTH = 40;
            const BUMP_HEIGHT = 30;
            const LINE_WIDTH = 2;

            // Globala variabler
            let player;
            let obstacles = [];
            let spawnObstacleID;
            let updateID;
            let animationID;
            let speed = 0;
            let distance = 0;
            let gameOver = false;
            let lastObstacleX = CANVAS_WIDTH;
            let shakeThreshold = 30; // Threshold för acceleration för hopp
            let lastAcceleration = { x: 0, y: 0, z: 0 };
            let tiltThresholdWalk = 10;
            let tiltThresholdRun = 25;
            let legAngle = 0; // För enkel gånganimation
            let legDirection = 1;

            class Player {
                constructor(x, y, size) {
                    this.x = x;
                    this.y = y;
                    this.size = size;
                    this.velocityY = 0;
                    this.isGrounded = true;
                }

                update() {
                    this.velocityY += GRAVITY;
                    this.y += this.velocityY;
                    if (this.y >= FLOOR_Y - this.size) {
                        this.y = FLOOR_Y - this.size;
                        this.velocityY = 0;
                        this.isGrounded = true;
                    }
                }

                jump(jumpHeight) {
                    if (this.isGrounded) {
                        this.velocityY = -jumpHeight;
                        this.isGrounded = false;
                    }
                }

                draw(ctx) {
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = LINE_WIDTH;
                    ctx.beginPath();

                    // Huvud (cirkel)
                    ctx.arc(this.x, this.y + 10, 10, 0, 2 * Math.PI);

                    // Kropp (linje)
                    ctx.moveTo(this.x, this.y + 20);
                    ctx.lineTo(this.x, this.y + 40);

                    // Armar
                    ctx.moveTo(this.x, this.y + 25);
                    ctx.lineTo(this.x - 10, this.y + 35);
                    ctx.moveTo(this.x, this.y + 25);
                    ctx.lineTo(this.x + 10, this.y + 35);

                    // Ben med enkel animation om speed > 0
                    const legOffset = speed > 0 ? Math.sin(legAngle) * 10 : 0;
                    ctx.moveTo(this.x, this.y + 40);
                    ctx.lineTo(this.x - 5 + legOffset, this.y + 50);
                    ctx.moveTo(this.x, this.y + 40);
                    ctx.lineTo(this.x + 5 - legOffset, this.y + 50);

                    ctx.stroke();
                }
            }

            class Obstacle {
                constructor(x, type) {
                    this.x = x;
                    this.width = OBSTACLE_WIDTH;
                    this.type = type; // 'hole' eller 'bump'
                    this.height = this.type === 'bump' ? BUMP_HEIGHT : 0;
                }

                update() {
                    this.x -= speed;
                }

                draw(ctx) {
                    if (this.type === 'bump') {
                        ctx.strokeStyle = COLORS.OBSTACLES;
                        ctx.lineWidth = LINE_WIDTH;
                        ctx.beginPath();
                        ctx.moveTo(this.x, FLOOR_Y);
                        ctx.lineTo(this.x, FLOOR_Y - this.height);
                        ctx.lineTo(this.x + this.width, FLOOR_Y - this.height);
                        ctx.lineTo(this.x + this.width, FLOOR_Y);
                        ctx.stroke();
                    }
                    // För hole ritas ingenting, bara skip i floor draw
                }
            }

            function spawnObstacle() {
                const type = Math.random() < 0.5 ? 'hole' : 'bump';
                const newX = lastObstacleX + MIN_OBSTACLE_DISTANCE + Math.random() * 200;
                const obstacle = new Obstacle(newX, type);
                obstacles.push(obstacle);
                lastObstacleX = newX;
                spawnObstacleID = setTimeout(spawnObstacle, 2000 + Math.random() * 3000);
            }

            function update() {
                updateID = setTimeout(update, 1000 / FPS);

                if (gameOver) return;

                // Uppdatera player
                player.update();

                // Animera ben
                if (speed > 0) {
                    legAngle += 0.2 * legDirection;
                    if (Math.abs(legAngle) > Math.PI / 2) legDirection *= -1;
                } else {
                    legAngle = 0;
                }

                // Uppdatera hinder
                obstacles.forEach(obstacle => {
                    obstacle.update();
                });

                // Ta bort hinder utanför skärmen
                obstacles = obstacles.filter(ob => ob.x + ob.width > 0);

                // Kollision
                obstacles.forEach(ob => {
                    const playerRect = {x: player.x, y: player.y, w: player.size / 2, h: player.size};
                    const obRect = {x: ob.x, y: FLOOR_Y - ob.height, w: ob.width, h: ob.height};

                    if (ob.type === 'bump') {
                        // Kollision med bump
                        if (playerRect.x < obRect.x + obRect.w &&
                            playerRect.x + playerRect.w > obRect.x &&
                            playerRect.y < obRect.y + obRect.h &&
                            playerRect.y + playerRect.h > obRect.y) {
                            endGame();
                        }
                    } else if (ob.type === 'hole') {
                        // Fall i hål om grounded och över hål
                        if (player.isGrounded &&
                            player.x + player.size / 2 > ob.x &&
                            player.x < ob.x + ob.width) {
                            endGame();
                        }
                    }
                });

                // Uppdatera distans
                distance += speed / FPS;
            }

            function draw(ctx) {
                animationID = requestAnimationFrame(() => draw(ctx));

                // Rensa canvas
                ctx.fillStyle = COLORS.BACKGROUND;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // Rita mark (linje med hål)
                ctx.strokeStyle = COLORS.FLOOR;
                ctx.lineWidth = LINE_WIDTH;
                let currentX = 0;
                while (currentX < CANVAS_WIDTH) {
                    let segmentEnd = CANVAS_WIDTH;
                    let inHole = false;
                    obstacles.forEach(ob => {
                        if (ob.type === 'hole' && currentX < ob.x + ob.width && currentX >= ob.x) {
                            inHole = true;
                        }
                        if (ob.x < currentX && ob.x + ob.width > currentX) {
                            segmentEnd = Math.min(segmentEnd, ob.x);
                        }
                    });
                    if (!inHole) {
                        ctx.beginPath();
                        ctx.moveTo(currentX, FLOOR_Y);
                        ctx.lineTo(Math.min(currentX + 100, segmentEnd), FLOOR_Y); // Rita segment
                        ctx.stroke();
                    }
                    currentX = segmentEnd;
                }

                // Rita hinder
                obstacles.forEach(ob => ob.draw(ctx));

                // Rita player
                player.draw(ctx);

                // Rita distans
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText(`Distans: ${Math.floor(distance)}`, 10, 30);

                if (gameOver) {
                    ctx.fillText(`Spelet Slut! Distans: ${Math.floor(distance)}`, CANVAS_WIDTH / 2 - 150, CANVAS_HEIGHT / 2);
                    ctx.fillText(`Tryck space för att starta om`, CANVAS_WIDTH / 2 - 150, CANVAS_HEIGHT / 2 + 30);
                }
            }

            function endGame() {
                gameOver = true;
                clearTimeout(updateID);
                clearTimeout(spawnObstacleID);
            }

            function reset() {
                gameOver = false;
                distance = 0;
                obstacles = [];
                lastObstacleX = CANVAS_WIDTH;
                player.y = FLOOR_Y - PLAYER_SIZE;
                player.velocityY = 0;
                player.isGrounded = true;
                update();
                spawnObstacle();
            }

            function handleOrientation(event) {
                let gamma = event.gamma || 0;
                // Justera för orientering, antar portrait
                if (Math.abs(gamma) < tiltThresholdWalk) {
                    speed = 0;
                } else if (Math.abs(gamma) < tiltThresholdRun) {
                    speed = 5 * (gamma > 0 ? 1 : -1); // Ändra tecken om nödvändigt
                } else {
                    speed = 10 * (gamma > 0 ? 1 : -1);
                }
                // Använd bara positiv hastighet åt höger
                speed = Math.max(0, speed); // Om negativ tilt är vänster, ignorera
            }

            function handleMotion(event) {
                const acc = event.accelerationIncludingGravity || {x:0, y:0, z:0};
                const deltaX = Math.abs(acc.x - lastAcceleration.x);
                const deltaY = Math.abs(acc.y - lastAcceleration.y);
                const deltaZ = Math.abs(acc.z - lastAcceleration.z);

                if (deltaX > shakeThreshold || deltaY > shakeThreshold || deltaZ > shakeThreshold) {
                    let jumpHeight = BASE_JUMP_VELOCITY;
                    if (speed === 0) jumpHeight = 10; // Litet hopp på stället
                    else if (speed === 5) jumpHeight = 15; // Liten bit
                    else if (speed === 10) jumpHeight = 20; // Längre
                    player.jump(jumpHeight);
                }

                lastAcceleration = { x: acc.x, y: acc.y, z: acc.z };
            }

            async function requestPermissions() {
                let orientationGranted = 'granted';
                let motionGranted = 'granted';

                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    orientationGranted = await DeviceOrientationEvent.requestPermission();
                }
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    motionGranted = await DeviceMotionEvent.requestPermission();
                }

                if (orientationGranted === 'granted' && motionGranted === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    window.addEventListener('devicemotion', handleMotion);
                    document.getElementById('startButton').style.display = 'none';
                    reset();
                } else {
                    alert('Tillstånd nekades. Spelet kan inte startas utan sensoråtkomst.');
                }
            }

            function init() {
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');

                player = new Player(PLAYER_X, FLOOR_Y - PLAYER_SIZE, PLAYER_SIZE);

                document.getElementById('startButton').addEventListener('click', requestPermissions);

                document.addEventListener('keydown', e => {
                    if (gameOver && e.code === 'Space') {
                        reset();
                    }
                });

                draw(ctx);
                // Update startas efter permission
            }

            window.onload = init;
        })();
    </script>
</body>
</html>
